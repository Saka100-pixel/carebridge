kind = "web"
previewPath = "/"
title = "CareBridge"
version = "1.0.0"
id = "artifacts/carebridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21211

[services.development]
run = "pnpm --filter @workspace/carebridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/carebridge", "run", "build" ]
publicDir = "artifacts/carebridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21211"
BASE_PATH = "/"
